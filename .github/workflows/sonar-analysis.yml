name: SonarQube Analysis

on:
  push:
    branches: [developer, main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Baluarte-core)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: baluarte_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d baluarte_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: graalvm-community
          java-version: "25"
          cache: maven

      - name: Run tests with coverage
        working-directory: ./Baluarte-core
        run: >
          bash ./mvnw test
          -Dspring.datasource.url=jdbc:postgresql://localhost:5432/baluarte_test
          -Dspring.datasource.driver-class-name=org.postgresql.Driver

      - name: Upload coverage to Codacy
        env:
          CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}
        run: |
          bash <(curl -Ls https://coverage.codacy.com/get.sh) report \
            -r Baluarte-core/target/site/jacoco/jacoco.xml

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@v6
        with:
          projectBaseDir: .
          args: >
            -Dsonar.projectKey=baluarte-backend
            -Dsonar.organization=joaopires3642
            -Dsonar.sources=Baluarte-core/src/main/java
            -Dsonar.java.binaries=Baluarte-core/target/classes
            -Dsonar.java.test.binaries=Baluarte-core/target/test-classes
            -Dsonar.java.coveragePlugin=jacoco
            -Dsonar.coverage.jacoco.xmlReportPaths=Baluarte-core/target/site/jacoco/jacoco.xml
        env:
          SONAR_HOST_URL: https://sonarcloud.io
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_BACKEND }}

  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate build
        run: npm run build

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@v6
        with:
          projectBaseDir: .
          args: >
            -Dsonar.projectKey=baluarte-frontend
            -Dsonar.organization=joaopires3642
            -Dsonar.sources=app/,src/
            -Dsonar.exclusions=**/node_modules/**,**/.next/**,**/__tests__/**,**/*.test.*,**/*.spec.*,public/**
        env:
          SONAR_HOST_URL: https://sonarcloud.io
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_FRONTEND }}
