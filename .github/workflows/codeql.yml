name: CodeQL

on:
  push:
    branches: [developer, main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 0 * * 0"

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript, java-kotlin]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: baluarte_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d baluarte_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality,security-extended
          build-mode: ${{ matrix.language == 'java-kotlin' && 'manual' || 'none' }}

      - if: matrix.language == 'java-kotlin'
        name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: graalvm-community
          cache: maven

      - if: matrix.language == 'java-kotlin'
        name: Build Java
        working-directory: ./Baluarte-core
        run: bash ./mvnw compile -DskipTests
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/baluarte_test
          SPRING_DATASOURCE_USERNAME: test
          SPRING_DATASOURCE_PASSWORD: test

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
