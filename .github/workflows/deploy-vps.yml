name: Build & Deploy VPS

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "Baluarte-core/**"
      - ".github/workflows/deploy-vps.yml"

concurrency:
  group: deploy-vps-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/joaopires3642/baluarte-core-native

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: baluarte_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d baluarte_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run backend tests
        working-directory: ./Baluarte-core
        run: >-
          bash ./mvnw test
          -Dspring.datasource.url=jdbc:postgresql://localhost:5432/baluarte_test
          -Dspring.datasource.driver-class-name=org.postgresql.Driver

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push native image
        uses: docker/build-push-action@v6
        with:
          context: ./Baluarte-core
          file: ./Baluarte-core/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy na VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /home/deploy/baluarte
            docker compose pull core
            docker compose up -d --no-deps core

            echo "Aguardando health check..."
            for i in $(seq 1 12); do
              sleep 5
              if curl -sf http://localhost:8080/actuator/health > /dev/null 2>&1; then
                echo "Deploy OK — container saudável"
                docker image prune -f --filter "until=24h"
                exit 0
              fi
            done

            echo "Deploy FAILED — health check não respondeu após 60s"
            exit 1
