name: Backend Native Image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "Baluarte-core/**"
      - ".github/workflows/backend-native-image.yml"

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push native image
        uses: docker/build-push-action@v6
        with:
          context: ./Baluarte-core
          file: ./Baluarte-core/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/joaopires3642/baluarte-core-native:latest
            ghcr.io/joaopires3642/baluarte-core-native:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
