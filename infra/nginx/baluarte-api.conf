# nginx — proxy reverso para o backend Spring Boot na VPS Contabo (13.140.168.181)
#
# Colocar em /etc/nginx/sites-available/core.dombaluarte.com.br e symlinkar:
#   ln -s /etc/nginx/sites-available/core.dombaluarte.com.br /etc/nginx/sites-enabled/
#
# Gerar o certificado Let's Encrypt antes:
#   sudo certbot --nginx -d core.dombaluarte.com.br
#
# Headers de seguranca duplicam o SecurityHeadersFilter do Spring Boot (defense in depth):
# se o nginx for o front door, ele garante os headers mesmo se o backend estiver em manutencao.

# Rate limiting por IP (zona compartilhada entre workers)
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

# Upstream do backend (Spring Boot na porta 8080 do docker-compose)
upstream baluarte_core {
    server 127.0.0.1:8080;
    keepalive 32;
}

server {
    listen 80;
    server_name core.dombaluarte.com.br;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name core.dombaluarte.com.br;

    ssl_certificate     /etc/letsencrypt/live/core.dombaluarte.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/core.dombaluarte.com.br/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Headers de seguranca (aplicados a todas as respostas, incluindo erros)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;
    add_header Referrer-Policy           "no-referrer" always;
    add_header Content-Security-Policy   "default-src 'none'; frame-ancestors 'none'" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=(), browsing-topics=()" always;

    # Body maximo (uploads de imagem, etc.)
    client_max_body_size 12m;

    location /api/ {
        # Rate limiting: 10 req/s por IP com burst de 20
        limit_req zone=api burst=20 nodelay;

        proxy_pass         http://baluarte_core;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # Actuator: sem rate limit agressivo (health checks), mas so interno se possivel
    location /actuator/health {
        proxy_pass http://baluarte_core;
        access_log off;
    }
}
