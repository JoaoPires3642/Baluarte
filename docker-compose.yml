services:
  db:
    image: postgres:16-alpine
    container_name: baluarte-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-baluarte}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d baluarte"]
      interval: 10s
      timeout: 5s
      retries: 5

  core:
    build:
      context: ./Baluarte-core
    container_name: baluarte-core
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: ${SPRING_FLYWAY_BASELINE_ON_MIGRATE:-true}
      DB_URL: ${DB_URL:-jdbc:postgresql://db:5432/baluarte}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      APP_AUTH_ADMIN_EMAILS: ${APP_AUTH_ADMIN_EMAILS:-}
      APP_AUTH_ADMIN_USER_IDS: ${APP_AUTH_ADMIN_USER_IDS:-}
      APP_AUTH_DEV_BYPASS_ENABLED: ${APP_AUTH_DEV_BYPASS_ENABLED:-false}
      APP_AUTH_DEV_BYPASS_KEY: ${APP_AUTH_DEV_BYPASS_KEY:-}
      APP_PAYMENT_MERCADOPAGO_ACCESS_TOKEN: ${APP_PAYMENT_MERCADOPAGO_ACCESS_TOKEN:-}
      APP_PAYMENT_MERCADOPAGO_PUBLIC_KEY: ${APP_PAYMENT_MERCADOPAGO_PUBLIC_KEY:-}
      APP_PAYMENT_MERCADOPAGO_WEBHOOK_SECRET: ${APP_PAYMENT_MERCADOPAGO_WEBHOOK_SECRET:-}
      APP_SHIPPING_PROVIDER: ${APP_SHIPPING_PROVIDER:-melhor_envio}
      APP_SHIPPING_BASE_URL: ${APP_SHIPPING_BASE_URL:-}
      APP_SHIPPING_API_TOKEN: ${APP_SHIPPING_API_TOKEN:-}
      APP_SHIPPING_WEBHOOK_SECRET: ${APP_SHIPPING_WEBHOOK_SECRET:-}
      APP_SHIPPING_SUPERFRETE_BASE_URL: ${APP_SHIPPING_SUPERFRETE_BASE_URL:-https://sandbox.superfrete.com}
      APP_SHIPPING_SUPERFRETE_TOKEN: ${APP_SHIPPING_SUPERFRETE_TOKEN:-}
      APP_SHIPPING_SUPERFRETE_SERVICES: ${APP_SHIPPING_SUPERFRETE_SERVICES:-1,2,17}
      APP_SHIPPING_SUPERFRETE_USER_AGENT: ${APP_SHIPPING_SUPERFRETE_USER_AGENT:-Baluarte/1.0 (contato@baluarte.com)}
      APP_SHIPPING_SUPERFRETE_CART_PATH: ${APP_SHIPPING_SUPERFRETE_CART_PATH:-/api/v0/cart}
      APP_SHIPPING_SUPERFRETE_CHECKOUT_PATH: ${APP_SHIPPING_SUPERFRETE_CHECKOUT_PATH:-/api/v0/checkout}
      APP_SHIPPING_SUPERFRETE_LABEL_LINK_PATH: ${APP_SHIPPING_SUPERFRETE_LABEL_LINK_PATH:-/api/v0/tag/print}
      APP_SHIPPING_SUPERFRETE_WEBHOOK_SECRET: ${APP_SHIPPING_SUPERFRETE_WEBHOOK_SECRET:-}
      APP_CORS_ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:8081,http://127.0.0.1:3000,http://127.0.0.1:8081,exp://*"
      APP_MEDIA_UPLOAD_DIR: ${APP_MEDIA_UPLOAD_DIR:-/var/www/uploads}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - uploads_data:/var/www/uploads

  frontend:
    build:
      context: .
    container_name: baluarte-next
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3000}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://core:8080/api/v1}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-baluarte-frontend}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-}
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER:-}
      NEXT_PUBLIC_MERCADOPAGO_PUBLIC_KEY: ${NEXT_PUBLIC_MERCADOPAGO_PUBLIC_KEY:-}
    depends_on:
      - core
    ports:
      - "3000:3000"

  web:
    build:
      context: ./Baluarte-web
    container_name: baluarte-web
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-8081}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://core:8080}
      EXPO_PUBLIC_API_BASE_URL: ${EXPO_PUBLIC_API_BASE_URL:-http://core:8080}
      EXPO_PUBLIC_ENV: ${EXPO_PUBLIC_ENV:-development}
      EXPO_PUBLIC_USE_MOCK_CATEGORIES: ${EXPO_PUBLIC_USE_MOCK_CATEGORIES:-false}
      EXPO_PUBLIC_ADMIN_EMAILS: ${EXPO_PUBLIC_ADMIN_EMAILS:-}
      EXPO_PUBLIC_ADMIN_BYPASS_KEY: ${EXPO_PUBLIC_ADMIN_BYPASS_KEY:-}
      EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY: ${EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY:-}
      EXPO_PUBLIC_MERCADOPAGO_PUBLIC_KEY: ${EXPO_PUBLIC_MERCADOPAGO_PUBLIC_KEY:-}
      EXPO_PUBLIC_SHIPPING_PROVIDER: ${EXPO_PUBLIC_SHIPPING_PROVIDER:-melhor_envio}
    depends_on:
      - core
    ports:
      - "8081:8081"

volumes:
  postgres_data:
  uploads_data:
