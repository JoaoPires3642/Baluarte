services:
  db:
    image: postgres:16-alpine
    container_name: baluarte-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-baluarte}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d baluarte"]
      interval: 10s
      timeout: 5s
      retries: 5

  core:
    build:
      context: ./Baluarte-core
    container_name: baluarte-core
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: ${SPRING_FLYWAY_BASELINE_ON_MIGRATE:-true}
      DB_URL: ${DB_URL:-jdbc:postgresql://db:5432/baluarte}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      APP_AUTH_ADMIN_EMAILS: ${APP_AUTH_ADMIN_EMAILS:-}
      APP_AUTH_ADMIN_USER_IDS: ${APP_AUTH_ADMIN_USER_IDS:-}
      APP_AUTH_DEV_BYPASS_ENABLED: ${APP_AUTH_DEV_BYPASS_ENABLED:-false}
      APP_AUTH_DEV_BYPASS_KEY: ${APP_AUTH_DEV_BYPASS_KEY:-}
      APP_FUSIONAUTH_ISSUER: ${APP_FUSIONAUTH_ISSUER:-auth.stackway.xyz}
      APP_FUSIONAUTH_JWKS_URI: ${APP_FUSIONAUTH_JWKS_URI:-https://auth.stackway.xyz/.well-known/jwks.json}
      APP_FUSIONAUTH_API_KEY: ${APP_FUSIONAUTH_API_KEY:-}
      APP_FUSIONAUTH_APPLICATION_ID: ${APP_FUSIONAUTH_APPLICATION_ID:-}
      SPRING_FLYWAY_VALIDATE_ON_MIGRATE: ${SPRING_FLYWAY_VALIDATE_ON_MIGRATE:-false}
      APP_PAYMENT_MERCADOPAGO_ACCESS_TOKEN: ${APP_PAYMENT_MERCADOPAGO_ACCESS_TOKEN:-}
      APP_PAYMENT_MERCADOPAGO_PUBLIC_KEY: ${APP_PAYMENT_MERCADOPAGO_PUBLIC_KEY:-}
      APP_PAYMENT_MERCADOPAGO_WEBHOOK_SECRET: ${APP_PAYMENT_MERCADOPAGO_WEBHOOK_SECRET:-}
      APP_PII_ENCRYPTION_KEY: ${APP_PII_ENCRYPTION_KEY:-}
      APP_PII_HMAC_KEY: ${APP_PII_HMAC_KEY:-}
      APP_PII_BACKFILL_ON_STARTUP: ${APP_PII_BACKFILL_ON_STARTUP:-false}
      APP_SHIPPING_PROVIDER: ${APP_SHIPPING_PROVIDER:-melhor_envio}
      APP_SHIPPING_BASE_URL: ${APP_SHIPPING_BASE_URL:-}
      APP_SHIPPING_API_TOKEN: ${APP_SHIPPING_API_TOKEN:-}
      APP_SHIPPING_WEBHOOK_SECRET: ${APP_SHIPPING_WEBHOOK_SECRET:-}
      APP_SHIPPING_SUPERFRETE_BASE_URL: ${APP_SHIPPING_SUPERFRETE_BASE_URL:-https://sandbox.superfrete.com}
      APP_SHIPPING_SUPERFRETE_TOKEN: ${APP_SHIPPING_SUPERFRETE_TOKEN:-}
      APP_SHIPPING_SUPERFRETE_SERVICES: ${APP_SHIPPING_SUPERFRETE_SERVICES:-1,2,17}
      APP_SHIPPING_SUPERFRETE_USER_AGENT: ${APP_SHIPPING_SUPERFRETE_USER_AGENT:-Baluarte/1.0 (contato@baluarte.com)}
      APP_SHIPPING_SUPERFRETE_CART_PATH: ${APP_SHIPPING_SUPERFRETE_CART_PATH:-/api/v0/cart}
      APP_SHIPPING_SUPERFRETE_CHECKOUT_PATH: ${APP_SHIPPING_SUPERFRETE_CHECKOUT_PATH:-/api/v0/checkout}
      APP_SHIPPING_SUPERFRETE_LABEL_LINK_PATH: ${APP_SHIPPING_SUPERFRETE_LABEL_LINK_PATH:-/api/v0/tag/print}
      APP_SHIPPING_SUPERFRETE_WEBHOOK_SECRET: ${APP_SHIPPING_SUPERFRETE_WEBHOOK_SECRET:-}
      APP_CORS_ALLOWED_ORIGINS: "http://localhost:3000,http://127.0.0.1:3000"
      APP_MEDIA_UPLOAD_DIR: ${APP_MEDIA_UPLOAD_DIR:-/var/www/uploads}
      APP_STORAGE_S3_ENDPOINT: ${APP_STORAGE_S3_ENDPOINT:-}
      APP_STORAGE_S3_REGION: ${APP_STORAGE_S3_REGION:-}
      APP_STORAGE_S3_BUCKET: ${APP_STORAGE_S3_BUCKET:-}
      APP_STORAGE_S3_ACCESS_KEY_ID: ${APP_STORAGE_S3_ACCESS_KEY_ID:-}
      APP_STORAGE_S3_SECRET_ACCESS_KEY: ${APP_STORAGE_S3_SECRET_ACCESS_KEY:-}
      APP_AMQP_URL: ${APP_AMQP_URL:-}
      APP_AMQP_PREFETCH: ${APP_AMQP_PREFETCH:-5}
      DB_POOL_MAX_SIZE: ${DB_POOL_MAX_SIZE:-10}
      DB_POOL_MIN_IDLE: ${DB_POOL_MIN_IDLE:-2}
      DB_POOL_MAX_LIFETIME_MS: ${DB_POOL_MAX_LIFETIME_MS:-1800000}
      SERVER_TOMCAT_THREADS_MAX: ${SERVER_TOMCAT_THREADS_MAX:-200}
      SERVER_TOMCAT_THREADS_MIN_SPARE: ${SERVER_TOMCAT_THREADS_MIN_SPARE:-20}
      SERVER_TOMCAT_MAX_CONNECTIONS: ${SERVER_TOMCAT_MAX_CONNECTIONS:-8192}
      SERVER_TOMCAT_ACCEPT_COUNT: ${SERVER_TOMCAT_ACCEPT_COUNT:-200}
      SERVER_CONNECTION_TIMEOUT: ${SERVER_CONNECTION_TIMEOUT:-20s}
      SERVER_KEEP_ALIVE_TIMEOUT: ${SERVER_KEEP_ALIVE_TIMEOUT:-30s}
      # Nota: native-image ignora -Xmx, mas mantemos para eventual fallback com JVM
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:--Xms256m -Xmx768m -XX:MaxRAMPercentage=75}
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1024M
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - uploads_data:/var/www/uploads

  frontend:
    build:
      context: .
    container_name: baluarte-next
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3000}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://core:8080/api/v1}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-}
      FUSIONAUTH_ISSUER: ${FUSIONAUTH_ISSUER:-https://auth.stackway.xyz}
      FUSIONAUTH_CLIENT_ID: ${FUSIONAUTH_CLIENT_ID:-}
      FUSIONAUTH_CLIENT_SECRET: ${FUSIONAUTH_CLIENT_SECRET:-}
      FUSIONAUTH_API_KEY: ${FUSIONAUTH_API_KEY:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_MERCADOPAGO_PUBLIC_KEY: ${NEXT_PUBLIC_MERCADOPAGO_PUBLIC_KEY:-}
    depends_on:
      - core
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  uploads_data:
