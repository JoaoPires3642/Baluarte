spring:
  application:
    name: baluarte-core
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/baluarte}
    username: ${DB_USERNAME:baluarte}
    password: ${DB_PASSWORD:baluarte}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
server:
  servlet:
    context-path: /
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
