spring:
  application:
    name: baluarte-core
  rabbitmq:
    # URL completa no formato amqps://user:pass@host/vhost (CloudAMQP/LavinMQ).
    # Se APP_AMQP_URL estiver vazia, o AMQP fica desativado (sem publisher/listener).
    addresses: ${APP_AMQP_URL:}
    connection-timeout: ${APP_AMQP_CONNECT_TIMEOUT:10s}
    requested-heartbeat: ${APP_AMQP_HEARTBEAT:30s}
    publisher-confirm-type: correlated
    publisher-returns: true
    template:
      mandatory: true
      retry:
        enabled: true
        initial-interval: 1000ms
        multiplier: 2
        max-interval: 10000ms
        max-attempts: 3
    listener:
      simple:
        acknowledge-mode: auto
        prefetch: ${APP_AMQP_PREFETCH:5}
        retry:
          enabled: true
          initial-interval: 1000ms
          multiplier: 2
          max-interval: 10000ms
          max-attempts: 3
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/baluarte}
    username: ${DB_USERNAME:baluarte}
    password: ${DB_PASSWORD:baluarte}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:2}
      idle-timeout: ${DB_POOL_IDLE_TIMEOUT_MS:30000}
      connection-timeout: ${DB_POOL_CONNECTION_TIMEOUT_MS:10000}
      max-lifetime: ${DB_POOL_MAX_LIFETIME_MS:1800000}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    outOfOrder: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
server:
  servlet:
    context-path: /
  tomcat:
    threads:
      max: ${SERVER_TOMCAT_THREADS_MAX:200}
      min-spare: ${SERVER_TOMCAT_THREADS_MIN_SPARE:20}
    max-connections: ${SERVER_TOMCAT_MAX_CONNECTIONS:8192}
    accept-count: ${SERVER_TOMCAT_ACCEPT_COUNT:200}
    connection-timeout: ${SERVER_CONNECTION_TIMEOUT:20s}
    keep-alive-timeout: ${SERVER_KEEP_ALIVE_TIMEOUT:30s}
  connection-timeout: ${SERVER_CONNECTION_TIMEOUT:20s}
  netty:
    connection-timeout: ${SERVER_CONNECTION_TIMEOUT:20s}
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}
  metrics:
    tags:
      service.name: ${spring.application.name}
      deployment.environment: ${DEPLOYMENT_ENVIRONMENT:production}
  otlp:
    metrics:
      export:
        enabled: ${OTLP_METRICS_ENABLED:true}
        url: ${OTLP_METRICS_URL:https://api.axiom.co/v1/metrics}
        headers:
          Authorization: Bearer ${AXIOM_INGEST_TOKEN:}
          X-Axiom-Dataset: ${AXIOM_DATASET:baluarte-prod}
          X-Axiom-Metrics-Dataset: ${AXIOM_DATASET:baluarte-prod}
    tracing:
      endpoint: ${OTLP_TRACES_ENDPOINT:https://api.axiom.co/v1/traces}
      headers:
        Authorization: Bearer ${AXIOM_INGEST_TOKEN:}
        X-Axiom-Dataset: ${AXIOM_DATASET:baluarte-prod}
app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}
  security:
    proxy-secret: ${APP_SECURITY_PROXY_SECRET:}
  fusionauth:
    issuer: ${APP_FUSIONAUTH_ISSUER:auth.stackway.xyz}
    jwks-uri: ${APP_FUSIONAUTH_JWKS_URI:https://auth.stackway.xyz/.well-known/jwks.json}
    api-key: ${APP_FUSIONAUTH_API_KEY:}
    application-id: ${APP_FUSIONAUTH_APPLICATION_ID:}
  auth:
    admin-emails: ${APP_AUTH_ADMIN_EMAILS:}
    admin-user-ids: ${APP_AUTH_ADMIN_USER_IDS:}
    dev-bypass-enabled: ${APP_AUTH_DEV_BYPASS_ENABLED:false}
    dev-bypass-key: ${APP_AUTH_DEV_BYPASS_KEY:}
  media:
    upload-dir: ${APP_MEDIA_UPLOAD_DIR:uploads}
  storage:
    s3:
      endpoint: ${APP_STORAGE_S3_ENDPOINT:}
      region: ${APP_STORAGE_S3_REGION:auto}
      bucket: ${APP_STORAGE_S3_BUCKET:}
      access-key-id: ${APP_STORAGE_S3_ACCESS_KEY_ID:}
      secret-access-key: ${APP_STORAGE_S3_SECRET_ACCESS_KEY:}
      presigned-url-ttl-minutes: ${APP_STORAGE_S3_PRESIGNED_URL_TTL_MINUTES:43200}
  shipping:
    active-provider: ${APP_SHIPPING_PROVIDER:mock}
    origin-cep: ${APP_SHIPPING_ORIGIN_CEP:01153000}
    package:
      product-weight-kg: ${APP_SHIPPING_PACKAGE_PRODUCT_WEIGHT_KG:0.3}
      product-height-cm: ${APP_SHIPPING_PACKAGE_PRODUCT_HEIGHT_CM:4}
      product-width-cm: ${APP_SHIPPING_PACKAGE_PRODUCT_WIDTH_CM:25}
      product-length-cm: ${APP_SHIPPING_PACKAGE_PRODUCT_LENGTH_CM:35}
    sender:
      name: ${APP_SHIPPING_SENDER_NAME:}
      phone: ${APP_SHIPPING_SENDER_PHONE:}
      email: ${APP_SHIPPING_SENDER_EMAIL:}
      document: ${APP_SHIPPING_SENDER_DOCUMENT:}
      street: ${APP_SHIPPING_SENDER_STREET:}
      number: ${APP_SHIPPING_SENDER_NUMBER:}
      complement: ${APP_SHIPPING_SENDER_COMPLEMENT:}
      district: ${APP_SHIPPING_SENDER_DISTRICT:}
      city: ${APP_SHIPPING_SENDER_CITY:}
      state: ${APP_SHIPPING_SENDER_STATE:}
    superfrete:
      base-url: ${APP_SHIPPING_SUPERFRETE_BASE_URL:https://sandbox.superfrete.com}
      token: ${APP_SHIPPING_SUPERFRETE_TOKEN:}
      services: ${APP_SHIPPING_SUPERFRETE_SERVICES:1,2,17}
      user-agent: ${APP_SHIPPING_SUPERFRETE_USER_AGENT:Baluarte/1.0 (contato@baluarte.com)}
      cart-path: ${APP_SHIPPING_SUPERFRETE_CART_PATH:/api/v0/cart}
      checkout-path: ${APP_SHIPPING_SUPERFRETE_CHECKOUT_PATH:/api/v0/checkout}
      label-link-path: ${APP_SHIPPING_SUPERFRETE_LABEL_LINK_PATH:/api/v0/tag/print}
      webhook-secret: ${APP_SHIPPING_SUPERFRETE_WEBHOOK_SECRET:}
  payment:
    active-provider: ${APP_PAYMENT_PROVIDER:mock}
    mercadopago:
      base-url: ${APP_PAYMENT_MERCADOPAGO_BASE_URL:https://api.mercadopago.com}
      access-token: ${APP_PAYMENT_MERCADOPAGO_ACCESS_TOKEN:}
      public-key: ${APP_PAYMENT_MERCADOPAGO_PUBLIC_KEY:}
      payer-email: ${APP_PAYMENT_MERCADOPAGO_PAYER_EMAIL:}
      payer-first-name: ${APP_PAYMENT_MERCADOPAGO_PAYER_FIRST_NAME:}
      webhook-secret: ${APP_PAYMENT_MERCADOPAGO_WEBHOOK_SECRET:}
  pii:
    # Base64(32 bytes). Obrigatória em prod/staging. Vazia = passthrough (dev/test).
    encryption-key: ${APP_PII_ENCRYPTION_KEY:}
    # Base64(32 bytes). Obrigatória quando encryption-key está setada (busca por CPF).
    hmac-key: ${APP_PII_HMAC_KEY:}
    # Roda o backfill de reencripte de rows legadas na inicialização (idempotente).
    backfill-on-startup: ${APP_PII_BACKFILL_ON_STARTUP:false}
