spring:
  application:
    name: baluarte-core
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/baluarte}
    username: ${DB_USERNAME:baluarte}
    password: ${DB_PASSWORD:baluarte}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
server:
  servlet:
    context-path: /
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}
  auth:
    admin-emails: ${APP_AUTH_ADMIN_EMAILS:}
    admin-clerk-user-ids: ${APP_AUTH_ADMIN_CLERK_USER_IDS:}
    clerk-issuer: ${APP_AUTH_CLERK_ISSUER:}
    clerk-jwks-uri: ${APP_AUTH_CLERK_JWKS_URI:}
    dev-bypass-enabled: ${APP_AUTH_DEV_BYPASS_ENABLED:false}
    dev-bypass-key: ${APP_AUTH_DEV_BYPASS_KEY:}
  media:
    upload-dir: ${APP_MEDIA_UPLOAD_DIR:uploads}
  payment:
    active-provider: ${APP_PAYMENT_PROVIDER:mock}
    mercadopago:
      base-url: ${APP_PAYMENT_MERCADOPAGO_BASE_URL:https://api.mercadopago.com}
      access-token: ${APP_PAYMENT_MERCADOPAGO_ACCESS_TOKEN:}
      public-key: ${APP_PAYMENT_MERCADOPAGO_PUBLIC_KEY:}
      payer-email: ${APP_PAYMENT_MERCADOPAGO_PAYER_EMAIL:}
      payer-first-name: ${APP_PAYMENT_MERCADOPAGO_PAYER_FIRST_NAME:}
      webhook-secret: ${APP_PAYMENT_MERCADOPAGO_WEBHOOK_SECRET:}
