spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/baluarte_test
    username: test
    password: test
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    outOfOrder: true

management:
  otlp:
    metrics:
      export:
        enabled: false
    tracing:
      enabled: false

app:
  storage:
    s3:
      bucket: false
  shipping:
    active-provider: mock
  payment:
    active-provider: mock
  fusionauth:
    issuer: http://test.local/auth
    api-key: test
    application-id: test
  auth:
    admin-emails: admin@test.com
    admin-user-ids: admin-test
    dev-bypass-enabled: true
    dev-bypass-key: test-key