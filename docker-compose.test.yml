services:
  db:
    image: postgres:18-alpine
    container_name: baluarte-test-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: baluarte
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d baluarte"]
      interval: 5s
      timeout: 3s
      retries: 10

  core:
    build:
      context: ./Baluarte-core
      dockerfile: Dockerfile.test
    container_name: baluarte-test-core
    restart: unless-stopped
    env_file: .env.test
    environment:
      DB_URL: jdbc:postgresql://db:5432/baluarte
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8090:8080"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
